<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/remixicon@4.2.0/fonts/remixicon.css" rel="stylesheet" />
    <link rel="stylesheet" href="theme.css">
    <link rel="stylesheet" href="style.css">
    <title>Pro Image Editor</title>
</head>
<body>
    
    <header>
        <div class="logo">
            <i class="ri-camera-lens-line"></i>
            <span>Lumina Edit</span>
        </div>
        <div class="actions">
            <label for="image-input" class="btn btn-secondary">
                <i class="ri-upload-2-line"></i> Open
                <input type="file" id="image-input" accept="image/*" hidden>
            </label>
            <button id="download-btn" class="btn btn-primary">
                <i class="ri-download-line"></i> Export
            </button>
        </div>
    </header>

    <main>
        <section class="canvas-container">
            <div class="canvas-wrapper">
                <div class="placeholder">
                    <i class="ri-image-add-line"></i>
                    <p>Open an image to start editing</p>
                </div>
                <canvas id="image-canvas"></canvas>
            </div>
            
            <button id="compare-btn" class="compare-btn" title="Hold to see original" disabled>
                <i class="ri-eye-line"></i>
            </button>
        </section>

        <aside class="sidebar">
            <div class="tabs">
                <button class="tab-btn active" data-target="adjust-panel">Adjust</button>
                <button class="tab-btn" data-target="presets-panel">Presets</button>
            </div>

            <div class="panels">
                <div id="adjust-panel" class="panel active">
                    <div class="panel-header">
                        <h3>Manual Adjustments</h3>
                        <button id="reset-btn" class="btn-text">Reset</button>
                    </div>
                    <div class="filters-list">
                        </div>
                </div>

                <div id="presets-panel" class="panel">
                    <h3>Filters & Moods</h3>
                    <div class="presets-grid">
                        </div>
                </div>
            </div>
        </aside>
    </main>

    <script src="script.js"></script>
</body>
</html>
